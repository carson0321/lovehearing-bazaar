version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bazaar-db
    environment:
      POSTGRES_DB: bazaar
      POSTGRES_USER: bazaar_user
      POSTGRES_PASSWORD: bazaar_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazaar_user -d bazaar"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: bazaar-backend
    environment:
      DATABASE_URL: postgresql://bazaar_user:bazaar_pass@postgres:5432/bazaar
      JWT_SECRET: lovehearing_dandelion_secret_2024
      PORT: 3001
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: lovehearing2024
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: bazaar-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
