services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: bazaar-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bazaar}
      POSTGRES_USER: ${POSTGRES_USER:-bazaar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bazaar_user} -d ${POSTGRES_DB:-bazaar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: bazaar-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bazaar_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bazaar}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-3001}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: bazaar-frontend
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: bazaar-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

