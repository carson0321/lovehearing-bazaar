version: '3.8'

# 開發模式：程式碼變動即時生效，無需重新 build
# 使用方式：docker compose -f docker-compose.dev.yml up
#
# 前端：http://localhost:3000  (Vite HMR)
# 後端：http://localhost:3001  (nodemon)

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: bazaar-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bazaar}
      POSTGRES_USER: ${POSTGRES_USER:-bazaar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bazaar_user} -d ${POSTGRES_DB:-bazaar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: node:${NODE_VERSION:-20}-alpine
    container_name: bazaar-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bazaar_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bazaar}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-3001}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    restart: unless-stopped

  frontend:
    image: node:${NODE_VERSION:-20}-alpine
    container_name: bazaar-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_BACKEND_URL: http://backend:${PORT:-3001}
    depends_on:
      - backend
    ports:
      - "3000:5173"
    restart: unless-stopped

volumes:
  postgres_data:
  backend_modules:
  frontend_modules:
